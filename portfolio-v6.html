<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 자산 포트폴리오 v6</title>

<style>
  :root {
    --bg:#080d18; --s1:#0e1726; --s2:#141f33; --border:#1c2a42;
    --green:#10b981; --red:#ef4444; --blue:#3b82f6; --amber:#f59e0b;
    --purple:#8b5cf6; --cyan:#06b6d4; --pink:#ec4899;
    --text:#e2e8f0; --muted:#64748b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Malgun Gothic','맑은 고딕',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;
    background:radial-gradient(ellipse 70% 40% at 10% 10%,rgba(16,185,129,.05) 0%,transparent 60%),
               radial-gradient(ellipse 60% 40% at 90% 90%,rgba(59,130,246,.06) 0%,transparent 60%);
    pointer-events:none;z-index:0;}

  .wrap{max-width:1200px;margin:0 auto;padding:28px 18px;position:relative;z-index:1;}

  /* [추가] 시트 연동 패널 스타일 */
  .sync-panel {
    background: var(--s1); border: 1px solid var(--border);
    padding: 12px 20px; border-radius: 12px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 15px; flex-wrap: wrap;
  }
  .sync-info { font-size: 0.8rem; color: var(--blue); font-weight: bold; }
  .sync-select { background: var(--bg); color: white; border: 1px solid var(--border); padding: 6px; border-radius: 6px; font-size: 0.8rem; }
  .sync-btn { background: var(--blue); color: white; border: none; padding: 7px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; transition: 0.2s; }
  .sync-btn:hover { background: #2563eb; }

  /* 이하 기존 v6 모든 스타일 유지 */
  .hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .hdr h1{font-size:1.75rem;font-weight:900;letter-spacing:-.04em;
    background:linear-gradient(135deg,#10b981,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .hdr p{font-size:.78rem;color:var(--muted);margin-top:4px;}
  .date-badge{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);
    color:var(--green);padding:6px 14px;border-radius:999px;font-size:.72rem;font-weight:600;white-space:nowrap;}

  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px;}
  .summary-card{background:var(--s1);border:1px solid var(--border);padding:20px;border-radius:16px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s;}
  .summary-card:hover{transform:translateY(-2px);border-color:rgba(59,130,246,.3);}
  .summary-label{font-size:.72rem;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:10px;}
  .summary-value{font-size:1.4rem;font-weight:800;letter-spacing:-.02em;}
  .summary-sub{font-size:.7rem;margin-top:6px;display:flex;align-items:center;gap:4px;}

  .pnl-plus{color:var(--green);} .pnl-minus{color:var(--red);}

  .note-box{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.15);padding:14px 18px;border-radius:12px;margin-bottom:24px;display:flex;align-items:flex-start;gap:12px;}
  .note-box i{color:var(--amber);font-size:1.1rem;margin-top:2px;}
  .note-content{font-size:.78rem;color:var(--text);line-height:1.6;opacity:.85;}

  .main-grid{display:grid;grid-template-columns:1fr 340px;gap:24px;}
  @media(max-width:1024px){.main-grid{grid-template-columns:1fr;}}

  .section-title{font-size:.9rem;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--text);}
  .section-title span{font-size:.72rem;color:var(--muted);font-weight:normal;}

  .card-list{display:flex;flex-direction:column;gap:12px;}
  .asset-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s;}
  .asset-card:hover{border-color:rgba(59,130,246,.2);}
  .asset-header{padding:14px 18px;background:rgba(255,255,255,.015);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .asset-info{display:flex;align-items:center;gap:10px;}
  .asset-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:.85rem;}
  .asset-name{font-size:.88rem;font-weight:700;}
  .asset-tag{font-size:.65rem;padding:2px 7px;border-radius:4px;background:var(--s2);color:var(--muted);font-weight:600;}
  .asset-price-info{text-align:right;}
  .asset-main-price{font-size:.95rem;font-weight:800;display:block;}
  .asset-pnl{font-size:.72rem;margin-top:2px;font-weight:600;}

  .asset-body{padding:14px 18px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .data-item{display:flex;flex-direction:column;gap:4px;}
  .data-label{font-size:.65rem;color:var(--muted);font-weight:600;}
  .data-value{font-size:.82rem;font-weight:600;}

  .chart-card{background:var(--s1);border:1px solid var(--border);padding:24px;border-radius:20px;margin-bottom:24px;position:sticky;top:20px;}
  .donut-container{position:relative;width:200px;height:200px;margin:20px auto;}
  canvas{width:100%;height:100%;}
  .chart-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
  .chart-center-label{font-size:.65rem;color:var(--muted);font-weight:600;}
  .chart-center-value{font-size:1.1rem;font-weight:800;margin-top:2px;}

  .legend-list{margin-top:24px;display:flex;flex-direction:column;gap:10px;}
  .legend-item{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;}
  .legend-left{display:flex;align-items:center;gap:8px;}
  .legend-dot{width:8px;height:8px;border-radius:2px;}
  .legend-name{font-weight:600;color:var(--text);opacity:.9;}
  .legend-val{font-weight:700;font-size:.78rem;}

  .loan-card{background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(139,92,246,.08));border:1px solid rgba(59,130,246,.2);padding:20px;border-radius:16px;margin-top:24px;}
  .loan-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .loan-title{font-size:.82rem;font-weight:800;color:var(--blue);display:flex;align-items:center;gap:6px;}
  .loan-badge{background:var(--blue);color:white;font-size:.62rem;padding:2px 6px;border-radius:4px;font-weight:bold;}
  .loan-main{margin-bottom:16px;}
  .loan-amt{font-size:1.3rem;font-weight:900;letter-spacing:-.02em;}
  .loan-progress-bg{height:6px;background:rgba(255,255,255,.05);border-radius:3px;margin:10px 0;overflow:hidden;}
  .loan-progress-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:3px;transition:width 1s ease-out;}
  .loan-details{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.05);}
  .loan-det-item{display:flex;flex-direction:column;gap:3px;}
  .loan-det-label{font-size:.65rem;color:var(--muted);font-weight:600;}
  .loan-det-value{font-size:.8rem;font-weight:700;}

  .btn-area{display:flex;gap:10px;margin-bottom:20px;justify-content:flex-end;}
  .price-edit-btn{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;font-size:.75rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;}
  .price-edit-btn:hover{background:var(--border);border-color:var(--muted);}

  /* 모달 */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-content{background:var(--s1);border:1px solid var(--border);width:100%;max-width:480px;border-radius:20px;box-shadow:0 25px 50px -12px rgba(0,0,0,.5);overflow:hidden;display:flex;flex-direction:column;max-height:90vh;}
  .modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .modal-header h2{font-size:1rem;font-weight:800;}
  .modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;}
  .modal-body{padding:24px;overflow-y:auto;}
  .editor-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:15px;}
  .editor-row label{font-size:.82rem;font-weight:600;color:var(--muted);display:flex;flex-direction:column;}
  .editor-row label span{font-size:.65rem;color:var(--muted);font-weight:normal;margin-top:2px;opacity:.7;}
  .editor-row input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:.85rem;font-weight:600;text-align:right;transition:border-color .2s;}
  .editor-row input:focus{outline:none;border-color:var(--blue);}
  .modal-footer{padding:20px 24px;border-top:1px solid var(--border);display:flex;gap:10px;}
  .btn-save{flex:1;background:var(--blue);color:white;border:none;padding:12px;border-radius:10px;font-weight:bold;cursor:pointer;}
  .btn-cancel{flex:1;background:var(--s2);color:var(--text);border:1px solid var(--border);padding:12px;border-radius:10px;font-weight:bold;cursor:pointer;}

  /* 애니메이션 */
  .fade{animation:fadeIn .6s ease-out forwards;opacity:0;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .d1{animation-delay:.1s} .d2{animation-delay:.2s} .d3{animation-delay:.3s} .d4{animation-delay:.4s}

  .editor-group{margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);}
  .editor-group:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
  .editor-group-title{font-size:.72rem;color:var(--blue);font-weight:800;margin-bottom:14px;text-transform:uppercase;letter-spacing:1px;}
</style>
</head>
<body>

<div class="wrap">
  <div class="sync-panel fade d1">
    <div class="sync-info">🔗 구글 시트 연동</div>
    <select id="sheet-mode" class="sync-select">
      <option value="current">현재가 (C열) 업데이트</option>
      <option value="target">지정일 종가 (D열) 업데이트</option>
    </select>
    <button onclick="updatePricesFromSheet()" class="sync-btn" id="btn-sync">🔄 종가 불러오기</button>
    <div style="font-size:0.7rem; color:var(--muted); margin-left:auto;">A:종목명 / C:현재가 / D:지정일</div>
  </div>

  <div class="hdr fade d1">
    <div>
      <h1>📊 내 자산 포트폴리오</h1>
      <p>계좌별 · 종목별 · 섹터별 통합 현황</p>
    </div>
    <div class="date-badge" id="display-date">📅 2026.03.04 종가 기준</div>
  </div>

  <div class="summary-grid fade d2" id="summary-area"></div>

  <div class="note-box fade d3">
    <i>💡</i>
    <div class="note-content">
      <strong>투자 메모:</strong> 비중 조절이 필요한 섹터(반도체/AI)를 확인하세요. <br/>
      미국 금리 인하 시점과 국내 수출 지표를 고려하여 포트폴리오 리밸런싱을 진행할 예정입니다.
    </div>
  </div>

  <div class="btn-area fade d3">
    <button class="price-edit-btn" onclick="openHoldingEditor()" style="background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.35);color:#a78bfa">
      ➕ 종목 추가/수정
    </button>
    <button class="price-edit-btn" onclick="openEditor()">
      ✏️ 현재가 편집
    </button>
  </div>

  <div class="main-grid">
    <div class="fade d4">
      <div class="section-title">자산 상세 현황 <span id="asset-count"></span></div>
      <div class="card-list" id="asset-list"></div>
    </div>

    <div class="fade d4">
      <div class="section-title">포트폴리오 분석</div>
      <div class="chart-card">
        <div class="donut-container">
          <canvas id="sectorChart"></canvas>
          <div class="chart-center">
            <div class="chart-center-label">자산총계</div>
            <div class="chart-center-value" id="chart-total">0</div>
          </div>
        </div>
        <div class="legend-list" id="chart-legend"></div>

        <div class="loan-card" id="loan-area"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editor-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>현재가 직접 편집</h2>
      <button class="modal-close" onclick="closeEditor()">×</button>
    </div>
    <div class="modal-body" id="editor-list"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditor()">취소</button>
      <button class="btn-save" onclick="saveEditor()">변경사항 저장</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="holding-editor-modal">
  <div class="modal-content" style="max-width:540px;">
    <div class="modal-header">
      <h2 id="holding-editor-title">종목 추가/수정</h2>
      <button class="modal-close" onclick="closeHoldingEditor()">×</button>
    </div>
    <div class="modal-body">
      <div class="editor-group">
        <div class="editor-group-title">기본 정보</div>
        <div class="editor-row">
          <label>종목명<span>정확한 이름을 입력하세요</span></label>
          <input type="text" id="he-name" placeholder="삼성전자" style="width:200px; text-align:left;">
        </div>
        <div class="editor-row">
          <label>섹터<span>분류 범주 (반도체, 배당주 등)</span></label>
          <input type="text" id="he-sector" placeholder="반도체" style="width:200px; text-align:left;">
        </div>
        <div class="editor-row">
          <label>계좌<span>보유 계좌명</span></label>
          <input type="text" id="he-account" placeholder="ISA" style="width:200px; text-align:left;">
        </div>
      </div>
      <div class="editor-group">
        <div class="editor-group-title">수량 및 평단</div>
        <div class="editor-row">
          <label>보유 수량<span>매수 완료된 수량</span></label>
          <input type="number" id="he-count" placeholder="100" style="width:150px">
        </div>
        <div class="editor-row">
          <label>매수 평단 (원)<span>평균 단가</span></label>
          <input type="text" id="he-avg" placeholder="70,000" style="width:150px">
        </div>
      </div>
      <div id="holding-list-in-editor" style="margin-top:20px; border-top:1px solid var(--border); padding-top:15px;">
        <div class="editor-group-title">기존 종목 선택 (수정 시 클릭)</div>
        <div id="holding-items-container" style="display:flex; flex-wrap:wrap; gap:8px; max-height:150px; overflow-y:auto; padding:5px;"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" style="flex:0.5" onclick="deleteHolding()" id="btn-delete-holding">삭제</button>
      <button class="btn-save" onclick="saveHolding()">저장하기</button>
    </div>
  </div>
</div>

<script>
  // [보존] 사용자 구글 시트 주소
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTxLofY6vBMIU_kcxAlbOIs9Boc5knX-SSQ_aadHrZtVZ-PuPRwGFuv7V9TOi1K0zoRLimECDq9D-rf/pub?gid=0&single=true&output=csv";

  // [보존] 기본 데이터
  const ACCT_COLORS = { '주식': '#3b82f6', 'ISA': '#10b981', '연금저축': '#f59e0b', '현금/파킹': '#06b6d4', '청약/기타': '#8b5cf6' };
  const SECTOR_MAP = { '반도체': '💻', '배당주': '💰', '지수ETF': '📈', '현금': '💵', '빅테크': '🚀', '2차전지': '🔋' };

  let fundDirect = { totalOriginal: 357000000, totalMonths: 480, remainingMonths: 444, annualRate: 4.4 };

  let prices = {
    '삼성전자': 195100, 'SK하이닉스': 939000, 'SK텔레콤': 52400, 'TIGER 미국S&P500': 18500, '현금': 1,
    'TIGER 미국나스닥100': 22400, 'TIGER 미국배당다우존스': 12300, 'TIGER 미국테크TOP10': 15800,
    'SOL 미국배당다우존스': 10500, '청약저축': 1
  };

  let HOLDINGS = [
    { name: '삼성전자', count: 120, avg: 72400, sector: '반도체', account: '주식' },
    { name: 'SK하이닉스', count: 45, avg: 168000, sector: '반도체', account: 'ISA' },
    { name: 'TIGER 미국S&P500', count: 850, avg: 14200, sector: '지수ETF', account: '연금저축' },
    { name: 'TIGER 미국나스닥100', count: 320, avg: 18900, sector: '지수ETF', account: '연금저축' },
    { name: 'SK텔레콤', count: 100, avg: 49500, sector: '배당주', account: 'ISA' },
    { name: '현금', count: 5400000, avg: 1, sector: '현금', account: '현금/파킹' }
  ];

  // [수정] 시트 연동 함수 (A열:이름, C열:현재가, D열:지정일)
  async function updatePricesFromSheet() {
      const btn = document.getElementById('btn-sync');
      const mode = document.getElementById('sheet-mode').value;
      
      try {
          btn.disabled = true;
          btn.innerText = "불러오는 중...";

          const response = await fetch(CSV_URL);
          const data = await response.text();
          const rows = data.split('\n');
          
          let updateCount = 0;
          rows.forEach((row, idx) => {
              if (idx === 0) return; 
              const cols = row.split(',');
              if (cols.length >= 4) {
                  const name = cols[0].trim(); 
                  const priceValue = (mode === 'current') ? cols[2] : cols[3];
                  const cleanPrice = parseFloat(priceValue.replace(/[^0-9.]/g, ''));

                  if (name && !isNaN(cleanPrice)) {
                      prices[name] = cleanPrice; 
                      updateCount++;
                  }
              }
          });

          document.getElementById('display-date').innerText = `📅 시트 데이터 반영 (${mode === 'current' ? '현재가' : '지정일'})`;
          alert(`${updateCount}개 종목 가격이 동기화되었습니다.`);
          renderAll(); 

      } catch (e) {
          alert('시트 연동 실패: ' + e.message);
      } finally {
          btn.disabled = false;
          btn.innerText = "🔄 종가 불러오기";
      }
  }

  // 로컬 저장/불러오기
  function saveToLocal() {
    localStorage.setItem('v6_prices', JSON.stringify(prices));
    localStorage.setItem('v6_holdings', JSON.stringify(HOLDINGS));
    localStorage.setItem('v6_loan', JSON.stringify(fundDirect));
  }
  function loadFromLocal() {
    const p = localStorage.getItem('v6_prices');
    const h = localStorage.getItem('v6_holdings');
    const l = localStorage.getItem('v6_loan');
    if(p) prices = JSON.parse(p);
    if(h) HOLDINGS = JSON.parse(h);
    if(l) fundDirect = JSON.parse(l);
  }

  function formatNum(n) { return Math.round(n).toLocaleString(); }

  function calculateLoan() {
    const monthlyRate = (fundDirect.annualRate / 100) / 12;
    const totalMonths = fundDirect.totalMonths;
    const remainingMonths = fundDirect.remainingMonths;
    const originalAmt = fundDirect.totalOriginal;
    const elapsedMonths = totalMonths - remainingMonths;

    const monthlyPayment = originalAmt * (monthlyRate * Math.pow(1 + monthlyRate, totalMonths)) / (Math.pow(1 + monthlyRate, totalMonths) - 1);
    
    let currentBalance = originalAmt;
    for(let i=0; i<elapsedMonths; i++) {
      let interest = currentBalance * monthlyRate;
      let principal = monthlyPayment - interest;
      currentBalance -= principal;
    }
    return { balance: Math.max(0, currentBalance), monthly: monthlyPayment, progress: (elapsedMonths / totalMonths) * 100 };
  }

  function renderAll() {
    const assetList = document.getElementById('asset-list');
    const summaryArea = document.getElementById('summary-area');
    const chartLegend = document.getElementById('chart-legend');
    assetList.innerHTML = '';
    
    let totalValue = 0;
    let totalInvest = 0;
    let sectorData = {};
    let accountData = {};

    HOLDINGS.sort((a,b) => (b.count * prices[b.name] || 0) - (a.count * prices[a.name] || 0));

    HOLDINGS.forEach(h => {
      const curPrice = prices[h.name] || 0;
      const curValue = h.count * curPrice;
      const investAmt = h.count * h.avg;
      const pnl = curValue - investAmt;
      const pnlRate = investAmt > 0 ? (pnl / investAmt) * 100 : 0;

      totalValue += curValue;
      totalInvest += investAmt;

      sectorData[h.sector] = (sectorData[h.sector] || 0) + curValue;
      accountData[h.account] = (accountData[h.account] || 0) + curValue;

      const card = document.createElement('div');
      card.className = 'asset-card';
      const icon = SECTOR_MAP[h.sector] || '🏷️';
      const acColor = ACCT_COLORS[h.account] || '#64748b';

      card.innerHTML = `
        <div class="asset-header">
          <div class="asset-info">
            <div class="asset-icon" style="background:rgba(255,255,255,.05); color:#fff">${icon}</div>
            <div>
              <div class="asset-name">${h.name} <span class="asset-tag">${h.account}</span></div>
            </div>
          </div>
          <div class="asset-price-info">
            <span class="asset-main-price">${formatNum(curPrice)}원</span>
            <span class="asset-pnl ${pnl>=0?'pnl-plus':'pnl-minus'}">${pnl>=0?'+':''}${formatNum(pnl)} (${pnlRate.toFixed(2)}%)</span>
          </div>
        </div>
        <div class="asset-body">
          <div class="data-item">
            <span class="data-label">보유수량</span>
            <span class="data-value">${h.count.toLocaleString()}</span>
          </div>
          <div class="data-item">
            <span class="data-label">평균단가</span>
            <span class="data-value">${formatNum(h.avg)}</span>
          </div>
          <div class="data-item">
            <span class="data-label">평가금액</span>
            <span class="data-value">${formatNum(curValue)}</span>
          </div>
        </div>
      `;
      assetList.appendChild(card);
    });

    const totalPnl = totalValue - totalInvest;
    const totalPnlRate = totalInvest > 0 ? (totalPnl / totalInvest) * 100 : 0;
    const loanInfo = calculateLoan();
    const netAsset = totalValue - loanInfo.balance;

    summaryArea.innerHTML = `
      <div class="summary-card">
        <div class="summary-label">🏦 총 자산평가</div>
        <div class="summary-value">${formatNum(totalValue)}원</div>
        <div class="summary-sub">투자원금: ${formatNum(totalInvest)}원</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">📈 총 투자수익</div>
        <div class="summary-value ${totalPnl>=0?'pnl-plus':'pnl-minus'}">${totalPnl>=0?'+':''}${formatNum(totalPnl)}</div>
        <div class="summary-sub ${totalPnl>=0?'pnl-plus':'pnl-minus'}">수익률: ${totalPnlRate.toFixed(2)}%</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">💸 대출 잔액</div>
        <div class="summary-value" style="color:var(--muted)">${formatNum(loanInfo.balance)}</div>
        <div class="summary-sub">월 상환: ${formatNum(loanInfo.monthly)}원</div>
      </div>
      <div class="summary-card" style="border-color:var(--amber)">
        <div class="summary-label" style="color:var(--amber)">✨ 순 자산</div>
        <div class="summary-value" style="color:var(--amber)">${formatNum(netAsset)}</div>
        <div class="summary-sub">자산 대비 부채비율: ${((loanInfo.balance/totalValue)*100).toFixed(1)}%</div>
      </div>
    `;

    document.getElementById('chart-total').innerText = formatNum(totalValue);
    document.getElementById('asset-count').innerText = `${HOLDINGS.length}개 종목`;

    const sortedSectors = Object.entries(sectorData).sort((a,b) => b[1] - a[1]);
    chartLegend.innerHTML = '';
    const colors = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#06b6d4', '#ec4899', '#64748b'];
    
    sortedSectors.forEach(([name, val], i) => {
      const per = (val / totalValue) * 100;
      const color = colors[i % colors.length];
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `
        <div class="legend-left">
          <div class="legend-dot" style="background:${color}"></div>
          <span class="legend-name">${name}</span>
        </div>
        <span class="legend-val">${per.toFixed(1)}%</span>
      `;
      chartLegend.appendChild(item);
    });

    drawDonut(sortedSectors.map(s => s[1]), colors);

    const loanArea = document.getElementById('loan-area');
    loanArea.innerHTML = `
      <div class="loan-header">
        <div class="loan-title">🏠 주택담보대출 현황 <span class="loan-badge">상환중</span></div>
        <div style="font-size:.7rem; color:var(--muted); cursor:pointer" onclick="openLoanEditor()">수정</div>
      </div>
      <div class="loan-main">
        <div class="loan-amt">${formatNum(loanInfo.balance)}원 남음</div>
        <div class="loan-progress-bg"><div class="loan-progress-bar" style="width:${loanInfo.progress}%"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:.65rem;color:var(--muted);font-weight:600;">
          <span>상환율 ${loanInfo.progress.toFixed(1)}%</span>
          <span>남은기간 ${fundDirect.remainingMonths}개월</span>
        </div>
      </div>
    `;
    saveToLocal();
  }

  function drawDonut(data, colors) {
    const canvas = document.getElementById('sectorChart');
    const ctx = canvas.getContext('2d');
    canvas.width = 400; canvas.height = 400;
    ctx.clearRect(0,0,400,400);

    let startAngle = -Math.PI/2;
    const total = data.reduce((a,b)=>a+b, 0);

    data.forEach((val, i) => {
      const sliceAngle = (val / total) * 2 * Math.PI;
      ctx.beginPath();
      ctx.moveTo(200, 200);
      ctx.arc(200, 200, 180, startAngle, startAngle + sliceAngle);
      ctx.closePath();
      ctx.fillStyle = colors[i % colors.length];
      ctx.fill();
      startAngle += sliceAngle;
    });

    ctx.beginPath();
    ctx.arc(200, 200, 130, 0, 2 * Math.PI);
    ctx.fillStyle = '#0e1726';
    ctx.fill();
  }

  // 모달 제어
  function openEditor() {
    const list = document.getElementById('editor-list');
    list.innerHTML = '';
    const sortedNames = Object.keys(prices).sort();
    sortedNames.forEach(name => {
      const row = document.createElement('div');
      row.className = 'editor-row';
      row.innerHTML = `
        <label>${name}</label>
        <input type="text" data-name="${name}" value="${formatNum(prices[name])}" oninput="this.value=this.value.replace(/[^0-9]/g,'').replace(/\\B(?=(\\d{3})+(?!\\d))/g,',')">
      `;
      list.appendChild(row);
    });
    document.getElementById('editor-modal').style.display = 'flex';
  }
  function closeEditor() { document.getElementById('editor-modal').style.display = 'none'; }
  function saveEditor() {
    const inputs = document.querySelectorAll('#editor-list input');
    inputs.forEach(input => {
      const name = input.getAttribute('data-name');
      prices[name] = parseInt(input.value.replace(/,/g, '')) || 0;
    });
    closeEditor();
    renderAll();
  }

  // 대출 편집
  let isLoanMode = false;
  function openLoanEditor() {
    isLoanMode = true;
    const list = document.getElementById('editor-list');
    list.innerHTML = `
      <div class="editor-group-title">대출 정보 수정</div>
      <div class="editor-row"><label>최초 대출액</label><input type="text" id="edit-l-orig" value="${formatNum(fundDirect.totalOriginal)}"></div>
      <div class="editor-row"><label>총 개월수</label><input type="number" id="edit-l-total" value="${fundDirect.totalMonths}"></div>
      <div class="editor-row"><label>남은 개월수</label><input type="number" id="edit-l-remain" value="${fundDirect.remainingMonths}"></div>
      <div class="editor-row"><label>연 금리 (%)</label><input type="number" id="edit-l-rate" step="0.1" value="${fundDirect.annualRate}"></div>
    `;
    document.getElementById('editor-modal').style.display = 'flex';
  }

  // 종목 추가/수정 모달
  let selectedHoldingIdx = -1;
  function openHoldingEditor() {
    selectedHoldingIdx = -1;
    document.getElementById('holding-editor-title').innerText = "새 종목 추가";
    document.getElementById('btn-delete-holding').style.display = 'none';
    
    document.getElementById('he-name').value = '';
    document.getElementById('he-sector').value = '';
    document.getElementById('he-account').value = '';
    document.getElementById('he-count').value = '';
    document.getElementById('he-avg').value = '';

    const container = document.getElementById('holding-items-container');
    container.innerHTML = '';
    HOLDINGS.forEach((h, idx) => {
      const btn = document.createElement('button');
      btn.className = 'price-edit-btn';
      btn.style.padding = '4px 8px';
      btn.style.fontSize = '0.65rem';
      btn.innerText = h.name;
      btn.onclick = () => selectHoldingForEdit(idx);
      container.appendChild(btn);
    });

    document.getElementById('holding-editor-modal').style.display = 'flex';
  }

  function selectHoldingForEdit(idx) {
    selectedHoldingIdx = idx;
    const h = HOLDINGS[idx];
    document.getElementById('holding-editor-title').innerText = "종목 수정: " + h.name;
    document.getElementById('btn-delete-holding').style.display = 'block';

    document.getElementById('he-name').value = h.name;
    document.getElementById('he-sector').value = h.sector;
    document.getElementById('he-account').value = h.account;
    document.getElementById('he-count').value = h.count;
    document.getElementById('he-avg').value = formatNum(h.avg);
  }

  function closeHoldingEditor() { document.getElementById('holding-editor-modal').style.display = 'none'; }

  function saveHolding() {
    const name = document.getElementById('he-name').value.trim();
    const sector = document.getElementById('he-sector').value.trim();
    const account = document.getElementById('he-account').value.trim();
    const count = parseInt(document.getElementById('he-count').value) || 0;
    const avg = parseInt(document.getElementById('he-avg').value.replace(/,/g, '')) || 0;

    if(!name || !sector || !account) { alert('모든 정보를 입력하세요.'); return; }

    const newH = { name, sector, account, count, avg };
    if(selectedHoldingIdx > -1) HOLDINGS[selectedHoldingIdx] = newH;
    else HOLDINGS.push(newH);

    if(!prices[name]) prices[name] = avg || 1; 

    closeHoldingEditor();
    renderAll();
  }

  function deleteHolding() {
    if(selectedHoldingIdx > -1 && confirm('정말 삭제하시겠습니까?')) {
      HOLDINGS.splice(selectedHoldingIdx, 1);
      closeHoldingEditor();
      renderAll();
    }
  }

  window.onload = () => { loadFromLocal(); renderAll(); };
</script>
</body>
</html>
